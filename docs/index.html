<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buscador de alquileres</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <div>
        <p class="eyebrow">Búsqueda personal</p>
        <h1>Buscador de alquileres</h1>
        <p id="status">Cargando…</p>
      </div>
      <div class="hero-actions">
        <button class="button" id="run-search">Buscar ahora</button>
        <a class="button secondary" href="/api/results.csv">Descargar CSV</a>
      </div>
    </header>

    <section class="settings-panel">
      <h2>Configuración de búsqueda</h2>
      <div class="form-grid">
        <div class="full"><label>Zonas, separadas por coma</label><input id="zones" placeholder="Ramos Mejía, Haedo, Castelar"></div>
        <div><label>Ambientes mínimos</label><input id="min-rooms" type="number" min="1"></div>
        <div><label>Ambientes máximos</label><input id="max-rooms" type="number" min="1"></div>
        <div><label>Precio máximo ARS</label><input id="max-price" type="number" min="0"></div>
        <div><label>Superficie mínima m²</label><input id="min-area" type="number" min="0"></div>
        <div class="full portal-options">
          <label><input id="portal-zonaprop" type="checkbox"> Zonaprop</label>
          <label><input id="portal-argenprop" type="checkbox"> Argenprop</label>
          <label><input id="visible-browser" type="checkbox"> Mostrar navegador durante la búsqueda</label>
        </div>
      </div>
      <button class="button secondary" id="save-config">Guardar configuración</button>
      <span id="save-message"></span>
    </section>

    <section id="execution-panel" class="execution-panel" hidden>
      <strong id="execution-title">Estado</strong>
      <pre id="execution-log"></pre>
    </section>

    <section class="summary" id="summary"></section>
    <section class="filters-panel">
      <div><label>Filtrar resultados</label><input id="text-filter" type="search" placeholder="Zona, título, portal…"></div>
      <div><label>Ordenar</label><select id="sort"><option value="score">Mejor estado</option><option value="price-asc">Menor precio</option><option value="price-desc">Mayor precio</option><option value="recent">Más recientes</option></select></div>
    </section>
    <section id="results" class="results"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
